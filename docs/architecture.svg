<svg width="900" height="620" viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'Cascadia Code', 'Segoe UI Mono', monospace">

  <!-- Background -->
  <rect width="900" height="620" fill="#0d1117"/>

  <!-- AWS boundary -->
  <rect x="24" y="24" width="852" height="572" rx="12" fill="none" stroke="#30363d" stroke-width="1.5" stroke-dasharray="8 4"/>
  <text x="42" y="46" font-size="11" fill="#8b949e" font-family="ui-monospace, monospace">AWS account</text>

  <!-- ── COMPUTE ─────────────────────────────────────────── -->
  <!-- EC2 box -->
  <rect x="48" y="60" width="200" height="68" rx="8" fill="#161b22" stroke="#388bfd" stroke-width="1.5"/>
  <text x="148" y="84" font-size="13" font-weight="600" fill="#58a6ff" text-anchor="middle">EC2 instance</text>
  <text x="148" y="102" font-size="10" fill="#8b949e" text-anchor="middle">SSM only · IMDSv2 · t2.micro</text>
  <text x="148" y="118" font-size="10" fill="#8b949e" text-anchor="middle">No SSH · no open ports</text>

  <!-- IAM Role box -->
  <rect x="48" y="148" width="200" height="52" rx="8" fill="#161b22" stroke="#388bfd" stroke-width="1.5"/>
  <text x="148" y="170" font-size="13" font-weight="600" fill="#58a6ff" text-anchor="middle">IAM Role</text>
  <text x="148" y="188" font-size="10" fill="#8b949e" text-anchor="middle">breach-lab-ec2-role</text>

  <!-- EC2 → IAM arrow -->
  <line x1="148" y1="148" x2="148" y2="128" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- SSM box -->
  <rect x="48" y="220" width="200" height="52" rx="8" fill="#161b22" stroke="#484f58" stroke-width="1"/>
  <text x="148" y="242" font-size="13" font-weight="600" fill="#8b949e" text-anchor="middle">SSM Session Manager</text>
  <text x="148" y="260" font-size="10" fill="#6e7681" text-anchor="middle">Outbound 443 only</text>

  <!-- IAM → SSM arrow -->
  <line x1="148" y1="220" x2="148" y2="200" stroke="#484f58" stroke-width="1" marker-end="url(#arrow-gray)"/>

  <!-- ── S3 BUCKETS ──────────────────────────────────────── -->
  <!-- Data bucket -->
  <rect x="310" y="60" width="210" height="68" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="415" y="84" font-size="13" font-weight="600" fill="#3fb950" text-anchor="middle">S3 data bucket</text>
  <text x="415" y="102" font-size="10" fill="#8b949e" text-anchor="middle">AES-256 · versioned · private</text>
  <text x="415" y="118" font-size="10" fill="#3fb950" text-anchor="middle">✓ allowed access</text>

  <!-- Sensitive bucket -->
  <rect x="310" y="152" width="210" height="68" rx="8" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
  <text x="415" y="176" font-size="13" font-weight="600" fill="#f85149" text-anchor="middle">S3 sensitive bucket</text>
  <text x="415" y="194" font-size="10" fill="#8b949e" text-anchor="middle">Explicit deny · 2-layer block</text>
  <text x="415" y="210" font-size="10" fill="#f85149" text-anchor="middle">✗ access blocked</text>

  <!-- Log bucket -->
  <rect x="310" y="244" width="210" height="68" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="415" y="268" font-size="13" font-weight="600" fill="#d29922" text-anchor="middle">S3 log bucket</text>
  <text x="415" y="286" font-size="10" fill="#8b949e" text-anchor="middle">No-delete policy · versioned</text>
  <text x="415" y="302" font-size="10" fill="#d29922" text-anchor="middle">CloudTrail destination</text>

  <!-- EC2 → Data bucket (allowed, solid green) -->
  <line x1="248" y1="86" x2="308" y2="86" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="278" y="80" font-size="10" fill="#3fb950" text-anchor="middle">allowed</text>

  <!-- EC2 → Sensitive bucket (blocked, dashed red) -->
  <line x1="248" y1="186" x2="308" y2="186" stroke="#f85149" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-red)"/>
  <text x="278" y="180" font-size="10" fill="#f85149" text-anchor="middle">blocked</text>

  <!-- EC2 → Log bucket (blocked, dashed red) -->
  <path d="M 248 200 Q 278 200 278 278 L 308 278" fill="none" stroke="#f85149" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-red)"/>
  <text x="282" y="248" font-size="10" fill="#f85149" text-anchor="middle">denied</text>

  <!-- ── DETECTION ───────────────────────────────────────── -->
  <!-- CloudTrail -->
  <rect x="590" y="60" width="200" height="68" rx="8" fill="#161b22" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="690" y="84" font-size="13" font-weight="600" fill="#bc8cff" text-anchor="middle">CloudTrail</text>
  <text x="690" y="102" font-size="10" fill="#8b949e" text-anchor="middle">All regions · data events on</text>
  <text x="690" y="118" font-size="10" fill="#8b949e" text-anchor="middle">Log file validation enabled</text>

  <!-- GuardDuty -->
  <rect x="590" y="152" width="200" height="68" rx="8" fill="#161b22" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="690" y="176" font-size="13" font-weight="600" fill="#bc8cff" text-anchor="middle">GuardDuty</text>
  <text x="690" y="194" font-size="10" fill="#8b949e" text-anchor="middle">15-min findings · ML-based</text>
  <text x="690" y="210" font-size="10" fill="#8b949e" text-anchor="middle">Reads CloudTrail automatically</text>

  <!-- CloudTrail → Log bucket -->
  <path d="M 690 128 L 690 240 Q 690 278 522 278" fill="none" stroke="#d29922" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="660" y="210" font-size="10" fill="#d29922" text-anchor="middle">writes logs</text>

  <!-- GuardDuty reads CloudTrail -->
  <line x1="690" y1="152" x2="690" y2="128" stroke="#bc8cff" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-purple)"/>

  <!-- ── ATTACK FLOW ─────────────────────────────────────── -->
  <rect x="24" y="338" width="852" height="232" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="42" y="360" font-size="11" fill="#8b949e">Attack simulation flow</text>

  <!-- Step boxes -->
  <rect x="48" y="372" width="155" height="56" rx="6" fill="#161b22" stroke="#484f58" stroke-width="1"/>
  <text x="125" y="394" font-size="12" font-weight="600" fill="#c9d1d9" text-anchor="middle">1. Recon</text>
  <text x="125" y="412" font-size="10" fill="#8b949e" text-anchor="middle">ListBuckets</text>
  <text x="125" y="424" font-size="10" fill="#3fb950" text-anchor="middle">✓ success</text>

  <rect x="228" y="372" width="155" height="56" rx="6" fill="#161b22" stroke="#f85149" stroke-width="1"/>
  <text x="305" y="394" font-size="12" font-weight="600" fill="#f85149" text-anchor="middle">2. Exfil attempt</text>
  <text x="305" y="412" font-size="10" fill="#8b949e" text-anchor="middle">Sensitive bucket</text>
  <text x="305" y="424" font-size="10" fill="#f85149" text-anchor="middle">✗ AccessDenied</text>

  <rect x="408" y="372" width="155" height="56" rx="6" fill="#161b22" stroke="#d29922" stroke-width="1"/>
  <text x="485" y="394" font-size="12" font-weight="600" fill="#d29922" text-anchor="middle">3. Data exfil</text>
  <text x="485" y="412" font-size="10" fill="#8b949e" text-anchor="middle">Data bucket read/write</text>
  <text x="485" y="424" font-size="10" fill="#d29922" text-anchor="middle">✓ success</text>

  <rect x="588" y="372" width="155" height="56" rx="6" fill="#161b22" stroke="#f85149" stroke-width="1"/>
  <text x="665" y="394" font-size="12" font-weight="600" fill="#f85149" text-anchor="middle">4. Cover tracks</text>
  <text x="665" y="412" font-size="10" fill="#8b949e" text-anchor="middle">Delete logs</text>
  <text x="665" y="424" font-size="10" fill="#f85149" text-anchor="middle">✗ AccessDenied</text>

  <!-- Step arrows -->
  <line x1="203" y1="400" x2="226" y2="400" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <line x1="383" y1="400" x2="406" y2="400" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <line x1="563" y1="400" x2="586" y2="400" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- IMDS + Detection row -->
  <rect x="48" y="454" width="190" height="56" rx="6" fill="#161b22" stroke="#d29922" stroke-width="1"/>
  <text x="143" y="476" font-size="12" font-weight="600" fill="#d29922" text-anchor="middle">5. IMDS harvest</text>
  <text x="143" y="494" font-size="10" fill="#8b949e" text-anchor="middle">IMDSv2 creds exposed</text>
  <text x="143" y="506" font-size="10" fill="#8b949e" text-anchor="middle">(temporary, auto-expire)</text>

  <rect x="264" y="454" width="504" height="56" rx="6" fill="#161b22" stroke="#bc8cff" stroke-width="1"/>
  <text x="516" y="476" font-size="12" font-weight="600" fill="#bc8cff" text-anchor="middle">Detection layer</text>
  <text x="516" y="494" font-size="10" fill="#8b949e" text-anchor="middle">CloudTrail logged all events including denied ones</text>
  <text x="516" y="506" font-size="10" fill="#8b949e" text-anchor="middle">GuardDuty raised findings within 15–30 min</text>

  <!-- Legend -->
  <line x1="48" y1="568" x2="78" y2="568" stroke="#3fb950" stroke-width="2"/>
  <text x="84" y="572" font-size="10" fill="#8b949e">allowed path</text>
  <line x1="170" y1="568" x2="200" y2="568" stroke="#f85149" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="206" y="572" font-size="10" fill="#8b949e">blocked / denied</text>
  <line x1="320" y1="568" x2="350" y2="568" stroke="#d29922" stroke-width="2"/>
  <text x="356" y="572" font-size="10" fill="#8b949e">log delivery</text>
  <line x1="440" y1="568" x2="470" y2="568" stroke="#bc8cff" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="476" y="572" font-size="10" fill="#8b949e">detection feed</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#388bfd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#f85149" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#d29922" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#bc8cff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#484f58" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

</svg>
